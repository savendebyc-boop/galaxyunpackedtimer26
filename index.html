<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Unpacked 2025</title>
    <style>
        @import url('https://fonts.googleapis.com');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Фоновое свечение в стиле Samsung */
        .glow {
            position: absolute;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(58, 123, 213, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.5; }
            to { transform: scale(1.2); opacity: 0.8; }
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .title {
            font-weight: 300;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-size: clamp(0.7rem, 2vw, 1.2rem);
            margin-bottom: 3rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .timer {
            display: flex;
            gap: clamp(1rem, 4vw, 3rem);
        }

        .unit {
            display: flex;
            flex-direction: column;
            min-width: 80px;
        }

        .number {
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 700;
            letter-spacing: -0.05em;
            line-height: 0.9;
            background: linear-gradient(180deg, #FFFFFF 0%, #777777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .label {
            font-size: clamp(0.6rem, 1.5vw, 0.8rem);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-top: 1rem;
            color: #555;
        }

        #message {
            display: none;
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            background: linear-gradient(90deg, #fff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (max-width: 480px) {
            .unit { min-width: 60px; }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="content">
        <div class="title" id="top-title">Galaxy Unpacked 2025</div>
        
        <div class="timer" id="timer">
            <div class="unit">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="unit">
                <span class="number" id="hours">00</span>
                <span class="label">Hrs</span>
            </div>
            <div class="unit">
                <span class="number" id="minutes">00</span>
                <span class="label">Min</span>
            </div>
            <div class="unit">
                <span class="number" id="seconds">00</span>
                <span class="label">Sec</span>
            </div>
        </div>

        <div id="message">Live Now</div>
    </div>

    <script>
        // Устанавливаем дату 25 февраля 2025 года, 21:00 по Москве (UTC+3)
        const targetDate = new Date("2025-02-25T21:00:00+03:00").getTime();

        function update() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById("timer").style.display = "none";
                document.getElementById("top-title").style.opacity = "0";
                document.getElementById("message").style.display = "block";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = String(d).padStart(2, '0');
            document.getElementById("hours").innerText = String(h).padStart(2, '0');
            document.getElementById("minutes").innerText = String(m).padStart(2, '0');
            document.getElementById("seconds").innerText = String(s).padStart(2, '0');
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>

</body>
</html>
